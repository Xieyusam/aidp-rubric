description: "评估文件编辑工具使用质量：鼓励先读后写、锚点唯一、最小改动与无重复编辑；惩罚盲写/盲改、幻觉锚点、引入错误与无进展循环。"

sp: ""  # System Prompt（建议留空）

up:
  pre_traj:  # 评估说明
    rubrics: |
      你是一个代码评估专家，需要评估以下agent的代码修改质量。

      评估标准：文件编辑工具使用质量
      评估Agent在使用文件修改工具（如SearchReplace、fileupdate、edit等）时，是否能够正确、稳定且高效地完成代码/文本变更，是否遵循"先读后写"原则，是否存在重复编辑行为。

      ═══════════════════════════════════════════════════════════════
      【严重违规行为 - 出现以下任一情况直接判定为1分】
      ═══════════════════════════════════════════════════════════════

      1. 违反"先读后写"原则：首次修改已有文件前未先读取文件内容。
         - 盲写：直接调用Write/Edit工具覆盖或修改已有文件，完全未查看原始内容
         - 盲改：靠"猜测"行号或内容进行局部替换，未确认文件实际内容
         - 注意：仅检查文件存在性（ls）不算读取，必须读取文件内容（cat、view、read_file等）
         - 例外：如果刚读取过文件或刚修改过文件，短期内连续修改同一文件不需要每次都重新读取

      2. 锚点幻觉：old_str在文件中根本不存在，虚构了不存在的代码段。

      3. 引入严重错误：new_str引入语法错误、破坏运行逻辑或导致程序崩溃。

      4. 无效循环编辑：围绕同一错误/同一逻辑反复修改3次以上且无实质性进展。
         - 无实质性进展的信号：反复修改相同代码段但问题依然存在、错误类型和数量基本不变、在多个解决方案间反复切换

      ═══════════════════════════════════════════════════════════════
      【评估要点】
      ═══════════════════════════════════════════════════════════════

      【先读后写原则】
        - 动作顺序：首次修改已有文件前，是否先执行了读取操作（cat、view、read_file）以获取上下文？
        - 意图确认：Agent是否不仅确认文件存在（ls），更确认了文件内部细节（content）后再动手？
        - 盲写检测：是否存在直接调用Write/Edit工具覆盖或修改已有文件，完全未查看原始内容的情况？
        - 连续修改：刚读取过或刚修改过的文件，短期内连续修改不需要每次都重新读取，这是合理的

      【编辑精准性】
        - 锚点唯一性（old_str）：old_str是否为文件中唯一且稳定的定位锚点？是否避免过短、过常见或可能多处匹配的片段（如单独的import行）？
        - 改动最小化（new_str）：new_str是否只包含最小必要改动？是否避免不必要的大段重复或整段覆盖式替换？
        - 修改意图清晰：修改范围与目的是否明确，是否便于审阅与回溯？

      【工具使用正确性】
        - 锚点存在性：old_str是否在文件中实际存在？是否出现幻觉（虚构不存在的代码段）？
        - 替换有效性：替换是否成功生效？是否通过update变相覆盖整个文件？
        - 结果可靠性：new_str是否引入语法错误、破坏运行逻辑或导致程序崩溃？

      【编辑效率与循环避免】
        - 重复编辑行为：是否围绕同一错误/同一逻辑反复修改3次以上且无实质性进展？
        - 有实质性进展的信号：单测错误数量减少、编译错误减少、功能逐步完善、逐步解决不同类型问题。
        - 低效循环模式：多次少量修改同一文件的相同逻辑，形成"看-改-看-改"三次以上的低效循环。
    scoring_schema:
      valid_scores: [0, 1, 2, 3]
      score_labels:
        3: "3分(优秀): 不存在任何严重违规。遵守'先读后写'原则（首次修改文件前先读取内容；连续修改同一文件时不需要每次都重新读取）。old_str是完美的唯一锚点，new_str只包含最小必要改动，修改意图明确清晰。工具使用正确无误，未引入任何语法错误或逻辑问题。编辑过程高效，无重复编辑行为，每次修改都有实质性进展。"
        2: "2分(合格): 不存在严重违规。遵守'先读后写'原则。old_str与new_str可能包含不必要的重复代码或上下文偏大；可能存在轻微的重复修改（1-2次），但最终能解决问题。"
        1: "1分(糟糕): 存在严重违规行为。包括：(1)违反'先读后写'原则（首次修改文件前完全未读取内容，盲写/盲改）；(2)锚点幻觉（old_str在文件中根本不存在）；(3)引入严重错误（new_str引入语法错误或导致程序崩溃）；(4)无效循环编辑（3次以上无实质性进展的重复编辑）。注意：连续修改同一文件不需要每次都重新读取，这不算违规。"
        0: "0分(不适用): 整个轨迹中Agent没有使用任何文件编辑工具（如SearchReplace、fileupdate、edit等），任务不涉及文件修改，无法评估文件编辑质量。注意：本维度仅评估Agent使用工具进行文件编辑的质量，不涉及Agent编写的代码中的文件读写逻辑。"
    instructions: |
      请注意：
      - 对话序号(idx)：从0开始，表示消息在对话中的位置