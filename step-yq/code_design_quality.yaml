description: "评估代码设计质量：鼓励模块化、数据驱动、最小修改与变更验证闭环；惩罚结构混乱、硬编码、破坏性变更与调试产物未清理。"

sp: ""  # System Prompt（建议留空）

up:
  pre_traj:  # 评估说明
    rubrics: |
      你是一个代码评估专家，需要评估以下agent的代码修改质量。

      评估标准：代码设计质量
      综合评估代码的架构设计（模块化、可维护性）、实现质量（功能正确性、算法效率、生态惯用法）、代码修改的合理性以及变更的风险控制。

      评估要点：
        【架构设计与模块化】
        - 职责分离：是否将逻辑拆分为职责单一的模块/类/函数？是否避免单个函数承担过多职责、代码结构混乱难以维护？
        - 代码抽象：当存在多处重复逻辑时，是否抽象为基类或通用工具函数，避免代码重复？（仅适用于确实存在重复代码的场景）
        - 数据驱动设计：是否使用数据驱动设计（字典/配置）而非长if/elif链？是否将配置与逻辑分离？
        - 扩展性：是否暴露清晰的扩展点（插件、基类、策略模式）？
        - 常量管理：是否避免在代码中直接写死数字或字符串，而是使用具名常量或配置参数？

        【实现质量】
        - 功能正确性：是否严格实现需求描述或协议规范？是否存在表面上有代码但实际不起作用的虚假实现？
        - 算法效率：是否采用最优或接近最优的时间/空间复杂度？是否避免循环中的昂贵操作？
        - 代码简洁性：代码是否易于理解和维护？是否遵循目标语言的惯例和最佳实践？

        【代码修改合理性】
        - 修改范围最小化：代码修改是否限制在最少必要文件？不必要的修改是否及时恢复？
        - 调试产物清理：调试和测试完成后，是否完全清理测试相关代码和产物/文件？
        - 变更方向一致性：代码变更是否朝着一致的前进方向，而非反复修改？

        【变更风险控制】
        - 变更验证策略：是否采用充分的验证手段？是仅依赖静态搜索（如grep），还是采用动态验证（编写验证脚本、运行测试）来确认变更影响？
        - 非破坏性变更：修改公共API（如函数签名、返回值）时，是采用直接修改的破坏性变更，还是采用包装器模式等非破坏性方式保证向后兼容？
        - 变更闭环：是否形成"分析-实施-验证"的完整工作流，确保没有引入预期之外的副作用？
    scoring_schema:
      valid_scores: [0, 1, 2, 3]
      score_labels:
        3: "3分(优秀): 架构方面：高度模块化、低耦合、数据驱动，相同功能抽象为通用函数/基类。实现方面：功能严格符合规范，算法高效，遵循生态惯用法。修改方面：变更限制在最少必要文件，调试产物完全清理，变更方向一致。风险控制方面：采用非破坏性变更策略保护公共API，结合静态分析和动态验证形成严密闭环。整体设计规范、实现专业。"
        2: "2分(合格): 架构方面：存在基本拆分，但某些模块职责混杂或有少量硬编码常量。实现方面：功能主路径正确，但算法效率较低或存在重复实现已有库功能的情况。修改方面：基本合理，但可能存在少量不必要的文件修改或调试产物未完全清理。风险控制方面：采用了安全实现但缺乏动态验证，或进行了验证但直接修改了公共API。能解决问题但增加了技术债。"
        1: "1分(糟糕): 架构方面：结构混乱，大段逻辑高度耦合难以维护，大量硬编码的数字和字符串。实现方面：功能或语义有明显偏差，采用明显低效的算法。修改方面：修改了大量不必要的文件，调试产物未清理，变更方向反复。风险控制方面：对公共API进行破坏性变更的同时完全不做验证或仅依赖不可靠的静态搜索，极易引入回归缺陷。"
        0: "0分(不适用): 整个轨迹中Agent没有编写或修改任何代码，任务不涉及代码设计，无法评估代码设计质量。"
    instructions: |
      请注意：
      - 对话序号(idx)：从0开始，表示消息在对话中的位置