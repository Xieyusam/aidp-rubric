description: "评估工具使用质量：鼓励必要且精准的工具调用、高效策略与正确理解工具功能；惩罚表演性调用、幻觉参数、人肉搜索与无效重复调用。"

sp: ""  # System Prompt（建议留空）

up:
  pre_traj:  # 评估说明
    rubrics: |
      你是一个代码评估专家，需要评估以下agent的代码修改质量。

      评估标准：工具使用质量
      评估Agent的工具调用是否正确、必要、精准、高效，是否存在调用错误、幻觉（虚构工具/参数/误解功能）、冗余调用或无效循环。

      评估要点：
        【工具调用正确性】（严重问题，出现即1分）
        - 虚构工具：是否调用了系统中根本不存在的工具？如调用一个叫"MagicFix"的工具，但工具列表中没有这个工具。
        - 工具命令错误：是否使用了工具不支持的命令/操作？如使用str_replace_editor的view命令，但该工具只支持str_replace操作。
        - 参数幻觉：是否虚构了工具不支持的参数、不存在的文件路径、或错误的参数格式？
        - 功能幻觉：是否误解工具的核心功能，导致调用意图与工具实际用途不符？如认为某个函数存在但实际不存在。
        - 结果幻觉：是否虚构了工具的返回结果，或基于不存在的返回结果进行后续操作？
        
        注意：bash命令层面的问题（如执行nano、vi等环境中不存在的命令）不属于本维度评估范围。

        【错误响应与循环避免】（严重问题）
        - 错误响应：工具返回明确错误后，是否能及时调整策略？
        - 及时纠正：如果Agent在收到错误后能够及时纠正并采用正确的方式，则不视为严重问题。
        - 无效循环：是否陷入无效的调用循环（≥3次相同或类似的失败调用且无实质性改进）？只有固执地反复调用才算严重问题。

        【工具调用必要性】
        - 调用必要性：是否在可以直接通过文本回答时，或在任务已经完成后，进行了不必要的工具调用？
        - 调用相关性：工具调用是否为实现用户目标提供实质价值，还是仅为与主题字面相关的"表演性"动作？

        【工具选择与策略】
        - 工具选择效率：是否优先使用最高效、最直接的工具？如使用search_by_regex而非反复view_folder逐层浏览目录。
        - 策略合理性：整个工具调用序列是否逻辑清晰、目的性强？是否存在"人肉搜索"式的低效策略（如反复view_folder三次以上寻找文件）？

        【工具使用效率】
        - 查询精准性：在需要从已有数据源中再次获取信息时，是采用精准的靶向查询，还是低效地重读整个数据源？
        - 冗余调用：是否存在可避免的探索性调用？如已知目标文件完整路径，仍用view_folder查看父目录。

    scoring_schema:
      valid_scores: [0, 1, 2, 3]
      score_labels:
        3: "3分(优秀): 工具调用完全正确，没有任何调用错误或幻觉。策略清晰高效，每一次调用都精准、必要且目的性强。能够正确判断何时应直接使用文本回复，何时需要调用工具。总是优先使用最高效、最直接的工具，在需要再次访问数据时采用靶向查询。遇到工具错误时能及时调整策略。"
        2: "2分(合格): 工具调用基本正确，没有出现调用错误或幻觉。能够完成任务，没有出现严重的'表演性'调用。但存在效率问题：可能会重读整个文件而非靶向查询；存在一两次可避免的探索性调用；或在某些环节采用了次优的工具选择。整体策略正确但不够精炼。"
        1: "1分(糟糕): 存在严重的工具使用问题。包括但不限于：(1)虚构工具：调用了系统中根本不存在的工具（注意：bash命令不存在不属于此类）；(2)工具命令错误：使用了工具不支持的命令/操作；(3)参数幻觉：虚构了不存在的参数、文件路径或错误的参数格式；(4)功能幻觉：误解工具功能，如调用不存在的函数或方法；(5)结果幻觉：虚构工具返回结果；(6)无效循环：在工具明确返回错误后仍固执地反复调用（≥3次且无实质性改进），陷入无效循环导致任务停滞（注意：如果及时纠正则不算严重问题）；(7)采用人肉搜索式低效策略（反复view_folder三次以上逐层浏览）。"
        0: "0分(不适用): 整个轨迹中Agent没有进行任何工具调用，任务完全通过纯文本对话完成，无法评估工具使用质量。"
    instructions: |
      请注意：
      - 对话序号(idx)：从0开始，表示消息在对话中的位置
      - 工具调用正确性是最重要的评估维度，出现调用错误、参数幻觉、功能幻觉、结果幻觉等问题必须给1分
      - 效率问题（如冗余调用、次优选择）在没有正确性问题的情况下可以给2分