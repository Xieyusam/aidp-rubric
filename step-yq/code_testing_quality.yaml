description: "评估测试与验证质量：鼓励按风险选择验证方式、优先既有测试、分析失败原因；惩罚高风险不验证、篡改断言、跳过既有测试与低风险过度验证。"

sp: ""  # System Prompt（建议留空）

up:
  pre_traj:  # 评估说明
    rubrics: |
      你是一个严格且专业的高级软件工程评估专家，需要评估以下agent的测试与验证质量。

      评估标准：测试与验证质量
      综合评估Agent在测试方面的能力，核心判断标准：原有测试是否通过、新测试是否恰当、测试是否集成到项目中。

      ═══════════════════════════════════════════════════════════════
      【评分核心逻辑】
      ═══════════════════════════════════════════════════════════════

      3分(优秀) = 原有测试通过 + 新测试恰当且通过 + 测试集成到项目 + 覆盖全面
      2分(合格) = 原有测试通过 + 新测试通过，但：覆盖不全面 或 测试未集成/未持久化
      1分(糟糕) = 出现严重违规行为（见下方列表）
      0分(不适用) = 任务无需测试

      ═══════════════════════════════════════════════════════════════
      【严重违规行为 - 出现以下任一情况直接判定为1分】
      ═══════════════════════════════════════════════════════════════

      1. 高风险任务不验证：对核心逻辑修改、Bug修复、重构等高风险任务，修改代码后不进行任何测试验证就提交。

      2. 跳过既有测试：项目已有完善测试框架，却未尝试运行，直接编写独立的临时测试脚本。（必须优先使用项目既有测试基础设施）

      3. 忽视测试失败：运行测试后发现失败，但未分析这些失败是否由自己的修改引入，就继续提交或进行下一步操作。

      4. 篡改测试通过：为了让测试通过而修改既有测试的逻辑或断言。
         - 允许：在既有测试中添加调试打印语句
         - 严禁：将 `assert x == 5` 改为 `assert x == 6` 来强行通过测试

      5. 时序颠倒：代码写入后直接回复用户"已修复"，跳过验证步骤，后面才发现代码跑不通。

      6. 测试未通过：原有测试或新测试最终未能通过。

      ═══════════════════════════════════════════════════════════════
      【评估要点】
      ═══════════════════════════════════════════════════════════════

      【验证决策 - 根据任务风险判断要不要测】

      必须运行时验证的任务：
      - 场景：核心业务逻辑变更、Bug修复、算法优化、重构、涉及数据增删改的操作
      - 预期行为：必须执行功能验证（单元测试、脚本运行、API请求等）
      - 错误行为：仅凭静态分析或"看起来对了"就提交代码，未进行实际运行验证

      仅需静态验证的任务：
      - 场景：纯文案修改、配置文件微调、类型定义调整
      - 预期行为：选择Lint检查、类型检查或简单构建命令即可
      - 错误行为：为验证文案修改而启动复杂的后端服务或数据库

      无需运行时验证的任务：
      - 场景：纯文档更新（README/注释）、代码格式化、变量重命名、非逻辑性文件移动
      - 预期行为：跳过构建和运行测试，仅通过文件读取确认修改内容
      - 错误行为：对此类任务运行耗时的构建或测试套件（资源浪费）

      委托用户验证的任务：
      - 场景：纯UI视觉调整、依赖特定物理设备、无头环境无法模拟的交互
      - 预期行为：诚实告知用户环境限制，提供Preview URL或验证指引，明确告知需要人工介入
      - 错误行为：在无头环境尝试启动GUI应用，或强行运行依赖外部环境的测试

      【验证时机 - 什么时候测】

      - 事前复现（加分项）：修复复杂Bug前，先运行代码确认复现了问题，建立基准
      - 交付前验证（必选）：代码修改写入文件后，立即运行验证命令，验证通过后再向用户交付
      - 自我修正闭环：验证失败时，在当前交互回合内自动分析日志、修复代码并再次验证
      - 及时止损：多次尝试无法解决时，应及时向用户报告并切换策略，而非无限循环

      【验证方式 - 怎么测】
      以下三点是模型在验证时都需要考虑的：

      运行项目既有测试：
      - 如果项目有测试框架（如pytest、jest），应运行确保既有测试通过
      - 应使用过滤参数（如`-k`、`grep`）定向运行相关测试，避免全量运行导致超时
      - 目的：确保修改没有破坏现有功能

      针对当前修改设计验证：
      - 根据当前Bug或修改内容，编写针对性的测试用例或验证脚本
      - 测试应能精准复现问题并验证修复效果
      - 新测试应尽量集成到项目测试框架中，而非临时脚本

      无法自动验证时委托用户：
      - 场景：UI视觉效果、依赖特定物理设备、无头环境无法模拟的交互
      - 要求：诚实告知用户环境限制，提供Preview URL或验证指引
      - 注意：这是最后手段，不能因为懒得写测试就委托用户

      【测试集成与维护】

      - 测试集成性：是否优先使用项目既有测试框架（如`npm test`、`pytest`），将新测试集成到现有文件？
      - 测试沉淀：是否将验证逻辑永久性整合到项目测试套件，防止未来回归？
      - 测试维护能力：测试失败时，能否正确判断是代码问题还是旧测试断言需要更新？是否避免为通过测试而修改用例掩盖代码缺陷？

    scoring_schema:
      valid_scores: [0, 1, 2, 3]
      score_labels:
        3: "3分(优秀): 原有测试全部通过，且根据任务需求恰当设计了新测试并通过。新测试已集成到项目测试框架中（而非临时脚本）。测试覆盖全面，包含正常路径、边界情况和异常处理。验证时机正确，严格遵循'修改→验证→交付'的时序。"
        2: "2分(合格): 原有测试全部通过，且设计了新测试并通过，但存在以下问题之一：(1)测试覆盖不够全面，遗漏了部分边界情况或异常路径；(2)新测试未持久化或未集成到项目测试框架中（使用了临时脚本验证后删除）；(3)缺少事前复现步骤。整体交付是经过验证且安全的，但测试质量有提升空间。"
        1: "1分(糟糕): 出现严重违规行为中的任一情况。包括：(1)高风险任务不验证就提交；(2)跳过既有测试框架，直接编写临时脚本验证；(3)测试失败但忽视继续提交；(4)篡改测试断言强行通过；(5)时序颠倒（先交付后发现跑不通）；(6)低风险任务过度验证造成资源浪费；(7)原有测试未通过或新测试未通过。"
        0: "0分(不适用): 任务本身无需测试验证（如纯文档更新、代码格式化、变量重命名等），或任务性质不适合进行测试（如纯探索性调研、信息查询、代码查看等），无法评估测试质量。"
    instructions: |
      请注意：
      - 对话序号(idx)：从0开始，表示消息在对话中的位置

      推理要求：
      1. 分析agent的整个解决过程，识别所有关键行为，并使用轮次编号标注不同阶段的行为（如"第X-Y轮: ..."）
      2. 重点检查是否存在【严重违规行为】中列出的任一情况
      3. 最后给出评分和理由