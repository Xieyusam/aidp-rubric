description: "评估工作流效率：鼓励有序规划、精准探索、高效执行与合理错误处理；惩罚失忆重做、盲目试错、越界操作与破坏性策略。"

sp: ""  # System Prompt（建议留空）

up:
  pre_traj:  # 评估说明
    rubrics: |
      你是一个代码评估专家，需要评估以下agent的代码修改质量。

      评估标准：工作流效率
      评估Agent的工作流程是否有序、高效、无冗余，包括信息探索效率、执行策略、错误响应和任务边界意识。

      评估要点：
        【流程规划】
        - 流程逻辑性：是否遵循清晰的分阶段模式（如"数据收集→综合分析→执行行动"），而非混乱地混合不同阶段？
        - 前置准备意识：在执行核心任务前，是否主动检查并配置必要的环境依赖（如启动服务、配置数据库）？还是被动等待错误发生后才去补救？
        - 注意：完全没有前置准备意识，导致反复因环境问题失败，属于严重缺陷，应判定为1分。

        【信息获取效率】
        - 信息探索效率：是否使用精准命令（如`ls /specific/path`、`grep -n`配合`view_range`）高效获取信息？还是使用`ls -R`、`cat`整个文件等宽泛命令污染上下文？
        - 执行上下文准确性：是否能始终保持正确的执行上下文（如当前工作目录CWD），避免因环境错位导致的可预防失败？
        - 状态记忆与上下文利用：能否记住任务完成状态和已获取信息，避免"失忆"或"健忘"导致的重复操作？

        【执行效率】
        - 环境与工具熟练度：面对构建、依赖或工具链问题时，是采用标准的命令标志或配置（如`-Djacoco.skip=true`、`-o`等专家捷径），还是采用繁琐、不稳定的变通方法？
        - 动作效率与批量处理：处理相似子任务时是一次性批量处理，还是陷入低效串行循环？
        - 无堆叠修改：是否验证前一个方案后再推进下一个？还是堆叠多个未经测试的修改方案？

        【错误处理】
        - 错误响应策略：遇错后是主动调查根因（分析日志、查看代码），还是盲目试错、反复执行失败命令？当前路径不可行时能否果断切换策略？
        - 非破坏性调试：面对错误时，是进行精准的代码级修复，还是采用破坏性策略（如删除数据表、重置环境）来绕过问题？

        【任务边界】
        - 任务聚焦度：是否始终围绕核心问题推进？还是偏离主线陷入支线任务？
        - 任务边界意识：是否严格遵守任务范围，完成后即结束？是否避免执行`git commit`、`git push`或删除用户文件等越界操作？
        - 豁免情况：如果用户主动要求执行`git commit`、`git push`等操作，则不视为越界。
    scoring_schema:
      valid_scores: [0, 1, 2, 3]
      score_labels:
        3: "3分(优秀): 工作流展现出清晰规划和高效执行。主动进行前置环境准备，通过精准搜索和合并操作以最少工具调用获得信息。始终保持正确的执行上下文，使用专家级命令标志解决环境问题。遵循明确逻辑分层，有效利用上下文，从不重复获取信息。验证前一个方案后再推进，无堆叠修改。面对错误能快速定位根因进行精准修复，不采用破坏性策略。始终聚焦核心任务，严格遵守任务边界。"
        2: "2分(合格): 成功完成任务，整体逻辑清晰，无严重'失忆'或循环错误，无越界操作。但存在轻微低效，如偶尔因CWD错误导致失败但能迅速纠正、使用了次优但可接受的探索方式、遇错需几次尝试才找到方向、前置准备不够充分导致中途补救。"
        1: "1分(糟糕): 存在严重流程缺陷：完全没有前置准备意识导致反复因环境问题失败；完全'失忆'重做已完成任务；探索螺旋（连续≥3次宽泛重复探索无进展）；使用`cat`整个文件或`ls -R`严重污染上下文；多次因CWD等上下文错误导致命令失败；采用繁琐的蛮力方法解决环境问题；堆叠多个未经测试的修改方案；盲目试错（反复执行失败命令≥3次）；采用破坏性策略（如删库）绕过问题；严重偏离主线；执行越界操作（用户主动要求除外）；workflow混乱无序。"
        0: "0分(不适用): 整个轨迹仅包含单轮简单问答，没有涉及多步骤工作流程，无法评估工作流效率。"
    instructions: |
      请注意：
      - 对话序号(idx)：从0开始，表示消息在对话中的位置