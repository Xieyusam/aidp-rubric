description: "评估响应语言一致性：鼓励与用户语言（中/英、术语、语气）一致；惩罚语言混用、乱码、无视用户术语或风格。"

sp: ""  # System Prompt（建议留空）

up:
  pre_traj:  # 评估说明
    rubrics: |
      你是一个代码评估专家，需要评估以下agent的代码修改质量。

      评估标准：响应语言一致性
      评估Agent在回应时，是否与用户使用的语言保持一致和贴切，包括自然语言匹配、语言纯净度、术语遵循和语气风格匹配。

      【重要】如何识别用户语言和Agent语言：
        - 用户语言：查看 `<被评估agent的user prompt>` 区域内的内容，这是用户使用的语言
        - Agent语言：查看 `<被评估agent的assistant 解决问题轨迹>` 区域内，每个 `assistant 开始` 到 `assistant 结束` 之间的内容，这是Agent的回复内容（包括思考和正文）
        - 评估目标：判断Agent回复内容中的自然语言是否与用户的语言保持一致

      不纳入评估的内容：
        - 系统生成的标签（如`<think>`、`<toolcall_result>`等尖括号标签）
        - 文件名和路径（如`./frontend/src/App.jsx`、`package.json`、`src/utils/`等）

      评估要点：
        【基础语言匹配】
        - 自然语言匹配：查看`<被评估agent的user prompt>`区域，如果用户使用中文，则`<被评估agent的assistant 解决问题轨迹>`区域中Agent就应以中文回应；如果用户使用英文，Agent就应以英文回应。这是最基本的要求。
        - 编程语言匹配：如果用户在提问中使用了特定编程语言（如Python），Agent的代码示例是否也使用了该语言？

        【语言纯净度】
        - 文本有效性：`<被评估agent的assistant 解决问题轨迹>`区域中Agent的响应是否为基本可读、有意义的文本？是否存在明显的乱码或无意义的词汇？
        - 语言纯净度：在主要语言的文本中，是否存在不合理的、来自其他语言的字符、词汇或短语混用？
        - 长对话一致性：在长对话中Agent是否能保持语言一致，而不是突然切换？

        【术语与风格】
        - 术语遵循：用户是否定义了某些特定术语或使用了行业"黑话"？Agent是否理解并在后续对话中正确地沿用这些术语？
        - 语气风格匹配：用户是采用正式、专业的语气，还是轻松、口语化的风格？Agent的回应是否与之匹配？

      合理例外情况（不视为语言混用）：
        - 代码或计算机命令（如`print("Hello")`、`git clone`）
        - 数学或科学公式（如`E=mc²`、`H₂O`）
        - 广为人知的专有名词、品牌、缩写（如`CPU`、`Python`、`Google`）
        - 对用户提问或问题材料中原文的直接引用（如用户描述了一个错误信息，错误信息显示是英文的，Agent在中文回复中引用该英文错误信息进行分析）
        - 行业术语和技术借用词（如在中文技术文档中使用`API`、`URL`、`bug`）
        - 表情符号或通用格式化符号
    scoring_schema:
      valid_scores: [0, 1, 2, 3]
      score_labels:
        3: "3分(优秀): Agent完美地遵循并适应了用户的语言习惯。全程使用正确的自然语言，无语言切换或混用问题。能较好地匹配用户的语境、沿用用户定义的术语，并适应用户的语气风格，表现出极高的默契度。"
        2: "2分(合格): Agent全程使用了正确的自然语言，没有出现语言切换或混用问题。对于明确指定的编程语言也能正确响应。但回应较为机械，未能适应用户的语气或沿用用户在对话中建立的特定术语。"
        1: "1分(糟糕): 存在严重的语言问题。包括：使用了与用户完全不同的语言进行回复；在对话中出现不当的、令人困惑的语言切换或混用；在单一回复中严重、无意义地混用多种语言导致内容难以理解；响应包含明显乱码或无意义文本。"
        0: "0分(不适用): Agent在整个轨迹中没有产生任何自然语言文本响应（仅有工具调用无文本输出），无法评估响应语言一致性。"
    instructions: |
      请注意：
      - 对话序号(idx)：从0开始，表示消息在对话中的位置