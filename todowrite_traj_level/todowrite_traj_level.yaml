description: "评估 TodoWrite 轨迹级质量：鼓励合理规划、及时状态更新与任务闭环；惩罚虚假完成、僵尸任务、未完成遗留与将总结/结束作为列表项。"

sp: ""  # System Prompt（建议留空）

up:
  pre_traj:  # 评估说明
    rubrics: |
      你是一个代码评估专家，需要评估以下agent的代码修改质量。

      评估标准：TodoWrite轨迹级质量（Traj-level）
      评估Agent在整个轨迹中对TodoWrite/任务清单工具的使用质量，包括规划质量、状态管理和最终完成度。

      ═══════════════════════════════════════════════════════════════
      【重要：首先判断是否适用本评估】
      ═══════════════════════════════════════════════════════════════

      在评估之前，必须先判断 system prompt 对 TodoWrite 的要求类型：

      1. 明确要求必须使用（如"你必须使用TodoWrite"、"MUST use TodoWrite"）：
         → 如果没有使用，判定为 1分（严重违规）
         → 如果使用了，继续评估使用质量

      2. 仅推荐/建议使用（如"建议使用"、"可以使用"、"推荐使用"）：
         → 如果没有使用，判定为 0分（不适用）
         → 如果使用了，继续评估使用质量

      3. 没有提及 TodoWrite：
         → 如果没有使用，判定为 0分（不适用）
         → 如果使用了，继续评估使用质量

      ═══════════════════════════════════════════════════════════════
      【评估要点】（仅当 Agent 使用了 TodoWrite 时评估）
      ═══════════════════════════════════════════════════════════════

        【规划质量】
        - 拆分粒度：步骤是否过粗或过细？是否覆盖关键环节？
        - 逻辑与可执行性：步骤顺序是否合理？是否构成清晰的作战计划？
        - 任务具体性：每一项是否均为清晰的"可执行动作"？严禁将"总结"、"归纳"、"整理报告"、"结束任务"作为列表项。
        - 指令符合性：是否满足明确的格式/数量等指令约束（如要求3-10项）？

        【状态管理】
        - 规划时机：是否在任务开始时就进行todo规划，而非中途才开始？
        - 及时更新：工具执行成功确信后是否立即更新状态？
        - 单次更新规范：一次调用中是否同时更新了多个任务状态？如果是，需判断是否确实同时完成了这些任务（如multi-agent并行执行），还是因为未及时更新而积压，还是根本没完成就乱标记？
        - 动态调整：遇到新信息/阻碍时是否主动增删改计划？能否根据当前结果动态剪枝不再需要的后续任务？
        - 僵尸残留：是否存在已完成的任务未及时删除，或显然失效的任务长期滞留？

        【最终完成度】
        - 任务闭环：轨迹结束时，所有任务是否都被标记为completed？
        - 无遗留任务：是否存在仍处于pending或in_progress状态的任务？
        - 完成真实性：被标记为completed的任务是否确实完成了？（结合轨迹中的实际行为判断）
        - 合理的未完成：如果存在未完成的任务，是否有合理的原因（如用户中途终止、遇到不可解决的阻塞并已说明）？
    scoring_schema:
      valid_scores: [3, 2, 1, 0]
      score_labels:
        3: "3分(优秀): 规划质量高，拆分粒度恰当，逻辑清晰，每一项都是具体可执行的动作。状态管理精准实时，执行成功后立即更新，能动态调整计划。轨迹结束时所有任务都已完成，任务管理完整闭环。"
        2: "2分(合格): 规划基本可用，可能存在轻微的拆分不当或逻辑非最优。状态管理基本正确，更新时机略有延迟但未造成流程阻塞。大部分任务已完成，存在1-2个任务未完成但有合理说明。"
        1: "1分(糟糕): system prompt明确要求必须使用TodoWrite却完全没有使用（注意：仅推荐使用但没用应判为0分）；或规划混乱（严重跳步、缺少关键步骤、项数不符要求）；或状态管理混乱（虚假完成、僵尸残留、计划与执行严重脱节）；或轨迹结束时存在多个任务未完成且无合理说明；或多个任务被标记为completed但实际并未完成；或Todo最后一项为'总结'、'整理报告'或'结束任务'。"
        0: "0分(不适用): (1)system prompt中没有提及TodoWrite工具，且整个轨迹中也没有使用；或(2)system prompt仅推荐/建议使用TodoWrite（非强制要求），但Agent没有使用。以上情况均无法评估，判定为不适用。"
    instructions: |
      请注意：
      - 对话序号(idx)：从0开始，表示消息在对话中的位置