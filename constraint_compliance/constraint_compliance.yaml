description: "评估指令遵循：鼓励遵守技术栈/版本/禁止项与流程指令（复现、测试、最小修改）；惩罚放弃核心需求、使用禁止元素、违反流程与工具使用约束。"

sp: ""  # System Prompt（建议留空）

up:
  pre_traj:  # 评估说明
    rubrics: |
      你是一个代码评估专家，需要评估以下agent的代码修改质量。

      评估标准：指令遵循
      评估Agent是否严格遵守用户在任务中设定的所有明确约束，包括"必须做"的正向约束和"禁止做"的负向约束，以及system prompt、system reminder和user prompt中关于任务流程的指令要求。

      ═══════════════════════════════════════════════════════════════
      【严重违规行为 - 出现以下任一情况直接判定为1分】
      ═══════════════════════════════════════════════════════════════

      1. 输出格式违规：要求特定输出格式却使用了其他格式。
         - 示例：要求JSON格式却输出Markdown、要求纯文本却输出代码块

      2. 工具使用违规：
         - 要求必须使用某工具却没有使用
           * 示例：要求用TodoWrite规划任务却没用、要求用Grep工具却用bash grep
         - 要求禁止使用某工具却使用了
           * 示例：禁止使用某个库却在代码中引入

      3. 操作执行违规：
         - 要求必须执行某操作却没有执行
           * 示例：要求修复后运行测试却只做总结不运行、要求修改前先复现问题却没做
         - 要求禁止执行某操作却执行了
           * 示例：要求不要修改测试文件却修改了、要求不要commit却commit了

      4. 技术栈违规：
         - 放弃用户指定的核心技术栈，使用未被要求的替代方案
           * 示例：要求用Tailwind CSS却用纯CSS、要求用React却用Vue
         - 使用了错误的版本
           * 示例：要求tailwindcss v3却使用了v4

      5. 禁止元素违规：使用了被明确禁止的元素
         - 示例：禁止使用emoji却使用了、禁止使用某个词汇却使用了

      ═══════════════════════════════════════════════════════════════
      【评估要点】
      ═══════════════════════════════════════════════════════════════

      【正向约束（必须做）】
        - 技术栈约束：是否使用了用户指定的技术栈、框架、库、版本？
        - 工具使用约束：是否使用了system prompt中要求必须使用的工具？
        - 操作执行约束：是否执行了要求必须执行的操作（如测试、复现、lint等）？
        - 输出格式约束：是否按照要求的格式输出？

      【负向约束（禁止做）】
        - 禁止元素：是否避免使用被明确禁止的元素（如emoji、特定库、特定词汇等）？
        - 禁止工具：是否避免使用被明确禁止的工具？
        - 禁止操作：是否避免执行被明确禁止的操作（如修改测试文件、commit等）？

      【约束坚守能力】
        - 当实现核心需求遇到困难时，Agent是坚持在约束内寻找解决方案，还是放弃该需求转而使用未被要求的替代方案？
        - 是否在整个实现过程中保持技术栈的一致性，而非中途切换到未被要求的技术？
    scoring_schema:
      valid_scores: [0, 1, 2, 3]
      score_labels:
        3: "3分(优秀): 完美地遵守了所有正向和负向约束，以及所有流程指令。在实现核心需求的过程中，即便遇到重大技术挑战，也能表现出强大的战略坚守能力，通过多种尝试最终在约束范围内解决问题。"
        2: "2分(合格): 严格遵守了所有核心约束和流程指令，没有出现严重违规。但可能在某个次要或不明确的建议上有轻微、无害的偏离（如因端口被占用改变启动端口、修改的代码运行错误但在后续步骤中成功修复等）。"
        1: "1分(糟糕): 明确违反了任何一项核心约束或流程指令。包括：(1)在面对技术困难时主动放弃用户指定的核心需求（如用纯CSS替代被要求的Tailwind CSS）；(2)使用了明确被禁止的元素；(3)使用了错误的版本；(4)违反输出格式要求（如要求JSON格式却输出Markdown）；(5)严重违反流程指令（如要求修复后运行测试却只做总结不做测试、fix任务要求修改前创建测试复现问题却没做）；(6)违反工具使用约束（如要求用TodoWrite规划任务却没用、要求用Grep却用bash grep）；(7)完全无视或系统性地违反多项约束。"
        0: "0分(不适用): 任务中没有设定任何明确的约束条件，无法评估约束遵循情况。"
    instructions: |
      请注意：
      - 对话序号(idx)：从0开始，表示消息在对话中的位置