description: "评估 TodoWrite 状态标记准确性：鼓励 completed/in_progress 与实际执行严格一致；惩罚提前打勾、幻觉打勾、延后打勾与幻觉任务项。"

sp: ""  # System Prompt（建议留空）

up:
  pre_traj:  # 评估说明
    rubrics: |
      你是一个代码评估专家，需要评估以下agent的代码修改质量。

      评估标准：TodoWrite状态标记准确性
      评估Agent在整个轨迹中，每次使用TodoWrite工具时，任务状态标记是否与实际执行情况严格一致。

      ═══════════════════════════════════════════════════════════════
      【重要：首先判断是否适用本评估】
      ═══════════════════════════════════════════════════════════════

      在评估之前，必须先判断 system prompt 对 TodoWrite 的要求类型：

      1. 明确要求必须使用（如"你必须使用TodoWrite"、"MUST use TodoWrite"）：
         → 如果没有使用，本维度由 todowrite_traj_level 判定为1分，本维度判0分
         → 如果使用了，继续评估状态标记准确性

      2. 仅推荐/建议使用（如"建议使用"、"可以使用"、"推荐使用"）：
         → 如果没有使用，判定为 0分（不适用）
         → 如果使用了，继续评估状态标记准确性

      3. 没有提及 TodoWrite：
         → 如果没有使用，判定为 0分（不适用）
         → 如果使用了，继续评估状态标记准确性

      ═══════════════════════════════════════════════════════════════
      【评估要点】（仅当 Agent 使用了 TodoWrite 时评估）
      ═══════════════════════════════════════════════════════════════

        【禁止提前打勾】
        - 任务尚未开始执行就被标记为completed
        - 任务正在进行中、结果未确认就被标记为completed

        【禁止幻觉打勾】
        - 任务执行失败（工具报错、测试不通过等）却被标记为completed
        - 任务根本没有执行却被标记为completed
        - 标记completed的任务内容与实际完成的工作不符

        【禁止延后打勾】
        - 任务已经明确完成，但迟迟不更新状态为completed
        - 在后续多轮中才补标之前已完成的任务

        【禁止幻觉任务】
        - TodoWrite中出现从未在轨迹中执行过的任务项
        - 凭空添加与用户需求无关的任务项

        【in_progress状态准确性】
        - 标记为in_progress的任务是否确实正在被执行
        - 是否存在多个任务同时标记为in_progress但实际只在做其中一个
    scoring_schema:
      valid_scores: [0, 1, 2, 3]
      score_labels:
        3: "3分(优秀): 整个轨迹中所有TodoWrite状态标记都与实际执行情况严格一致。没有提前打勾、幻觉打勾、延后打勾或幻觉任务。每个completed都对应真实完成的工作，每个in_progress都对应正在进行的任务。"
        2: "2分(合格): 整体状态标记准确，但存在轻微问题。如个别任务的completed标记略有延迟（1-2轮内补标）；或in_progress状态切换不够及时；但不存在幻觉打勾或提前打勾等严重问题。"
        1: "1分(糟糕): 存在明显的状态标记错误。包括：将未完成或失败的任务标记为completed（幻觉打勾）；任务尚未执行就标记为completed（提前打勾）；出现从未执行过的幻觉任务项；或多处状态标记与实际执行情况严重不符。"
        0: "0分(不适用): (1)整个轨迹中没有使用TodoWrite/任务清单工具；或(2)system prompt仅推荐/建议使用TodoWrite（非强制要求），但Agent没有使用。以上情况均无法评估，判定为不适用。"
    instructions: |
      请注意：
      - 对话序号(idx)：从0开始，表示消息在对话中的位置